<svg viewBox="0 0 980 640" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <style>
    .ttl{font-size:20px;font-weight:bold;fill:#1F6FB2}
    .cap{font-size:12px;fill:#555}
    .lbl{font-size:12px;fill:#222}
    .num{font-size:12px;font-weight:bold;fill:#fff}
    .numc{fill:#1F6FB2}
    .li{font-size:12.5px;fill:#222}
    .lih{font-size:13px;font-weight:bold;fill:#1F6FB2}
    .src{font-size:10.5px;fill:#666}
    .pvc{fill:#dfe7ee;stroke:#5a6b7a;stroke-width:2}
    .struct{fill:#cfd8e0;stroke:#5a6b7a;stroke-width:2}
    .bottle{fill:none;stroke:#9aa7b3;stroke-width:1.6;stroke-dasharray:6 4}
    .air{stroke:#1f6fb2;stroke-width:3;fill:none}
    .cord{stroke:#e67e22;stroke-width:2;stroke-dasharray:5 4;fill:none}
    .seal{fill:#c0392b}
    .tie{stroke:#444;stroke-width:1.6;fill:none}
    .ground{stroke:#8a6d3b;stroke-width:2}
  </style>

  <rect x="6" y="6" width="968" height="628" fill="#ffffff" stroke="#1F6FB2" stroke-width="2"/>
  <text x="26" y="36" class="ttl">Bouwtekening &#8211; waterraket-lanceerinstallatie (Clark cable-tie / Gardena)</text>
  <text x="26" y="55" class="cap">Op afstand op druk brengen, lanceren en ontluchten; met manometer en aftapventiel. Schematisch, niet op schaal.</text>

  <line class="ground" x1="40" y1="545" x2="545" y2="545"/>

  <rect class="struct" x="175" y="527" width="250" height="16"/>
  <line class="ground" x1="200" y1="543" x2="190" y2="572"/>
  <line class="ground" x1="400" y1="543" x2="410" y2="572"/>

  <rect class="pvc" x="283" y="300" width="16" height="227"/>

  <path class="bottle" d="M250,150 Q291,118 332,150 L332,250 Q332,288 305,300 L305,332 M277,300 Q250,288 250,250 Z"/>
  <path class="bottle" d="M277,300 L277,332 M305,300 L305,332"/>
  <text x="345" y="150" class="lbl">PET-fles (neck-down)</text>

  <rect class="struct" x="272" y="303" width="38" height="8"/>
  <ellipse class="seal" cx="291" cy="316" rx="9" ry="3"/>
  <path class="tie" d="M276,332 L276,312 M286,332 L286,310 M296,332 L296,310 M306,332 L306,312"/>
  <rect x="268" y="320" width="46" height="16" fill="none" stroke="#1f6fb2" stroke-width="2"/>

  <path class="cord" d="M268,328 C210,330 200,360 250,372 L470,372"/>
  <text x="346" y="388" class="cap">&#8594; trekkoord naar veilige afstand (&#8805; 10 m)</text>

  <path class="air" d="M291,520 L291,512 L120,512"/>
  <path class="air" d="M250,512 L250,486"/>
  <circle cx="250" cy="466" r="22" fill="#f7fafd" stroke="#1f6fb2" stroke-width="2.5"/>
  <line x1="250" y1="466" x2="262" y2="455" stroke="#c0392b" stroke-width="2"/>
  <text x="250" y="470" class="cap" text-anchor="middle" font-size="9">bar</text>
  <circle cx="212" cy="512" r="7" fill="#fff" stroke="#1f6fb2" stroke-width="2"/>
  <path class="air" d="M212,519 L212,532"/>
  <text x="198" y="546" class="cap">ontluchten</text>
  <path d="M165,505 L165,519 L153,512 Z" fill="#1f6fb2"/>
  <line x1="153" y1="505" x2="153" y2="519" stroke="#1f6fb2" stroke-width="2.5"/>
  <rect x="104" y="505" width="16" height="14" class="pvc"/>
  <text x="78" y="498" class="cap">fietspomp</text>

  <g>
    <circle class="numc" cx="430" cy="150" r="10"/><text class="num" x="430" y="154" text-anchor="middle">1</text>
    <circle class="numc" cx="322" cy="299" r="10"/><text class="num" x="322" y="303" text-anchor="middle">2</text>
    <circle class="numc" cx="322" cy="332" r="10"/><text class="num" x="322" y="336" text-anchor="middle">3</text>
    <circle class="numc" cx="256" cy="320" r="10"/><text class="num" x="256" y="324" text-anchor="middle">4</text>
    <circle class="numc" cx="274" cy="316" r="10"/><text class="num" x="274" y="320" text-anchor="middle">5</text>
    <circle class="numc" cx="312" cy="430" r="10"/><text class="num" x="312" y="434" text-anchor="middle">6</text>
    <circle class="numc" cx="291" cy="505" r="10"/><text class="num" x="291" y="509" text-anchor="middle">7</text>
    <circle class="numc" cx="410" cy="535" r="10"/><text class="num" x="410" y="539" text-anchor="middle">8</text>
    <circle class="numc" cx="455" cy="372" r="10"/><text class="num" x="455" y="376" text-anchor="middle">9</text>
    <circle class="numc" cx="120" cy="490" r="10"/><text class="num" x="120" y="494" text-anchor="middle">10</text>
    <circle class="numc" cx="159" cy="490" r="10"/><text class="num" x="159" y="494" text-anchor="middle">11</text>
    <circle class="numc" cx="250" cy="498" r="10"/><text class="num" x="250" y="502" text-anchor="middle">12</text>
    <circle class="numc" cx="222" cy="455" r="10"/><text class="num" x="222" y="459" text-anchor="middle">13</text>
    <circle class="numc" cx="212" cy="490" r="10"/><text class="num" x="212" y="494" text-anchor="middle">14</text>
  </g>

  <line x1="556" y1="80" x2="556" y2="560" stroke="#cdddea" stroke-width="1.5"/>
  <text x="576" y="98" class="lih">Onderdelenlijst</text>
  <text x="576" y="124" class="li">1.  PET-fles 1,5 L, neck-down geplaatst</text>
  <text x="576" y="148" class="li">2.  Flessenflens (PCO1881-hals) &#8211; wordt vastgegrepen</text>
  <text x="576" y="172" class="li">3.  Cable ties rondom (Clark-mechanisme)</text>
  <text x="576" y="196" class="li">4.  Release-kraag/schuifring: omhoog = vast, omlaag = los</text>
  <text x="576" y="220" class="li">5.  O-ring, afdichting launch tube &#8596; flessenhals</text>
  <text x="576" y="244" class="li">6.  Launch tube, &#189;&#8243; PVC-buis</text>
  <text x="576" y="268" class="li">7.  Basiskoppeling/T-stuk (richel voor de ties)</text>
  <text x="576" y="292" class="li">8.  Grondplaat met haringen (verankering)</text>
  <text x="576" y="316" class="li">9.  Trekkoord naar afstandsbediening (&#8805; 10 m)</text>
  <text x="576" y="340" class="li">10. Schraderventiel / pompaansluiting (fietspomp)</text>
  <text x="576" y="364" class="li">11. Terugslagklep (non-return)</text>
  <text x="576" y="388" class="li">12. T-splitsing in de luchtlijn</text>
  <text x="576" y="412" class="li">13. Manometer 0&#8211;16 bar</text>
  <text x="576" y="436" class="li">14. Aftap-/ontluchtingsventiel (kogelkraan)</text>

  <text x="576" y="476" class="src">Bronnen:</text>
  <text x="576" y="492" class="src">&#8226; Air Command Rockets &#8211; aircommandrockets.com/construction_index.htm</text>
  <text x="576" y="506" class="src">&#8226; US Water Rockets &#8211; uswaterrockets.com (cable tie launcher tutorial)</text>
  <text x="576" y="520" class="src">&#8226; B. Wheeler (BYU) &#8211; et.byu.edu/~wheeler/benchtop/clark.php</text>
  <text x="576" y="534" class="src">&#8226; Spacepage (NL/BE) &#8211; spacepage.be (Gardena-launcher)</text>

  <text x="26" y="600" class="cap">Veiligheid: pomp en lanceer vanaf &#8805; 10 m; gebruik de aftapkraan om bij een misser de druk veilig af te laten. Begin laag (3&#8211;4 bar), nooit boven ~7 bar. Test drukdelen vol water achter een afscherming.</text>
  <text x="26" y="618" class="cap">De terugslagklep houdt de druk in de fles als je de pomp losneemt; de manometer leest de flesdruk; de release-kraag wordt via het trekkoord omlaag getrokken om te lanceren.</text>
</svg>
